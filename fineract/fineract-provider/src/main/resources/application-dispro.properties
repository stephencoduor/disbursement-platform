# ============================================================
# DisbursePro — Application Profile Override
# Activate via: SPRING_PROFILES_ACTIVE=dispro
# ============================================================

application.title=DisbursePro Disbursement Platform

# ── Timezone ──
fineract.tenant.timezone=Africa/Lusaka

# ── Tenant ──
fineract.tenant.identifier=default
fineract.tenant.name=fineract_default
fineract.tenant.description=DisbursePro - Zambia Mobile Money Disbursements

# ── CORS (allow DisbursePro frontends) ──
fineract.security.cors.enabled=true
fineract.security.cors.allowed-origin-patterns=http://localhost:5173,http://localhost:5174,https://dispro.fineract.us,https://*.disbursepro.co.zm

# ── Disable unused features ──
fineract.security.2fa.enabled=false
fineract.job.loan-cob-enabled=false

# ── Content ──
fineract.content.filesystem.root-folder=/tmp/dispro-content

# ── Monitoring ──
management.metrics.tags.application=dispro-fineract
